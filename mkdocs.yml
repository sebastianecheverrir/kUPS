site_name: kUPS Docs
site_url: https://cusp-ai-oss.github.io/kUPS/
repo_url: https://github.com/cusp-ai-oss/kUPS
repo_name: cusp-ai-oss/kUPS
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2024-2026 CuspAI
theme:
  name: material
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

  font:
    text: Inter
    code: JetBrains Mono

  icon:
    logo: material/cup
    repo: fontawesome/brands/github

  features:
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - header.autohide
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
plugins:
  - search
  - mkdocstrings
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cusp-ai-oss/kUPS
      name: kUPS on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/kups/
      name: kUPS on PyPI

copyright: Copyright &copy; 2024-2026 CuspAI

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/mermaid.js

# Currently zensical reports false positives in mkdocstrings
# https://github.com/zensical/zensical/issues/600
validation:
  unresolved_references: false

nav:
  - Home: index.md
  - Simulations: simulations.md
  - Handbook:
    - Overview: handbook.md
    - Tables: notebooks/tables.md
    - Lenses: notebooks/lens.md
    - Runtime Assertions: notebooks/runtime_assertions.md
    - Propagators: notebooks/propagators.md
    - Conventions: notebooks/conventions.md
    - Patches: notebooks/patches.md
    - Neighbor Lists: notebooks/neighborlist.md
    - Potentials: notebooks/potentials.md
    - Monte Carlo Moves: notebooks/mc_moves.md
    - Logging: notebooks/logging.md
  - Units: units.md
  - Troubleshooting: troubleshooting.md
